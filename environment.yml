name: spyn-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pyqt=5.15
  - pandas>=0.25
  - numpy>=1.17
  - scipy>=1.3
  - matplotlib>=3.1
  - openbabel>=3.0        # available via conda-forge
  - pip
  - pip:
      - pytest>=6.0
      - pytest-cov>=2.10
      - -e .              # install spyn in editable mode after cloning

# NOTE: Quantum ESPRESSO >= 6.3 with GIPAW support must be installed
# separately (it requires Fortran compilation and MPI).
# See docs/installation.md for step-by-step instructions.
#
# Required symbolic links after QE installation:
#   ln -s /path/to/qe/bin/pw.x    /path/to/spyn/code/spyn/pw
#   ln -s /path/to/qe/bin/gipaw.x /path/to/spyn/code/spyn/gipaw
#
# Pseudopotentials (pbe-tm-new-gipaw-dc) must be placed in:
#   code/spyn/pp/
# Download from: http://www.gipaw.net
